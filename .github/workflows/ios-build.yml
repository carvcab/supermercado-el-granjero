name: Build iOS Swift App

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decode and place GoogleService-Info.plist
        run: |
          mkdir -p "app iphone supermercado/ios/ElGranjero"
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 -d > "app iphone supermercado/ios/ElGranjero/GoogleService-Info.plist"
          ls -la "app iphone supermercado/ios/ElGranjero/GoogleService-Info.plist"

      - name: Install CocoaPods
        run: |
          cd "app iphone supermercado/ios"
          pod install --repo-update

      - name: Build IPA
        run: |
          cd "app iphone supermercado/ios"
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find "app iphone supermercado/ios/build" -name "El Granjero.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "APP NOT FOUND, searching..."
            find "app iphone supermercado/ios/build" -name "*.app" -type d
            exit 1
          fi
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -r ElGranjero-iOS.ipa Payload/
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ElGranjero-iOS
          path: ElGranjero-iOS.ipa
